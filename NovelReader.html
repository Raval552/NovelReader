<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Novel Reader">
<title>Novel Reader</title>
<link id="pwa-manifest" rel="manifest">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Noto+Naskh+Arabic:wght@400;500;700&display=swap');

/* ═══════════════════════ TOKENS ═══════════════════════ */
:root {
  --bg:       #000000;
  --s1:       #0c0c0c;
  --s2:       #131313;
  --s3:       #1b1b1b;
  --bd:       #232323;
  --bd2:      #2f2f2f;
  --tx:       #e2ddd5;
  --tx2:      #5e5e5e;
  --tx3:      #333333;
  --gd:       #c4a24a;
  --gd2:      #7a6120;
  --gd3:      #dbb96a;
  --re:       #b04040;
  --gr:       #3a8050;
  --r:        7px;
  --fs:       19px;
  --lh:       2.05;
  --bar:      52px;
  --maxw:     660px;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;height:100%}
body{
  background:var(--bg);
  color:var(--tx);
  font-family:'Crimson Pro','Georgia',serif;
  font-size:var(--fs);
  line-height:var(--lh);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;
}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* ═══════════════════════ TOPBAR ═══════════════════════ */
#bar{
  position:fixed;top:0;left:0;right:0;z-index:300;
  height:var(--bar);
  background:rgba(0,0,0,.95);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:6px;padding:0 12px;
  transition:transform .32s cubic-bezier(.4,0,.2,1);
}
#bar.hide{transform:translateY(-100%)}

.logo{
  font-family:'DM Mono',monospace;
  font-size:.68rem;font-weight:500;
  color:var(--gd);letter-spacing:.2em;
  text-transform:uppercase;white-space:nowrap;
  user-select:none;flex-shrink:0;
}
.gap{flex:1}

/* ── buttons ── */
.btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 9px;border-radius:var(--r);
  border:1px solid var(--bd2);background:var(--s3);
  color:var(--tx2);
  font-family:'DM Mono',monospace;
  font-size:.62rem;letter-spacing:.07em;text-transform:uppercase;
  cursor:pointer;white-space:nowrap;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.btn:hover,.btn:focus-visible{
  background:var(--s2);border-color:var(--gd2);color:var(--gd3);outline:none;
}
.btn.on{background:var(--gd2);border-color:var(--gd);color:var(--gd3)}
.btn.gold{background:var(--gd2);border-color:var(--gd);color:var(--gd3)}
.btn.gold:hover{background:#8a7020}
.btn svg{width:12px;height:12px;fill:currentColor;flex-shrink:0}

/* font-size widget */
.fsw{
  display:flex;align-items:center;
  border:1px solid var(--bd2);border-radius:var(--r);
  overflow:hidden;background:var(--s3);
}
.fsw button{
  background:none;border:none;color:var(--tx2);
  width:22px;height:26px;cursor:pointer;font-size:.95rem;
  display:flex;align-items:center;justify-content:center;
  transition:color .14s;
}
.fsw button:hover{color:var(--gd3)}
.fsw span{
  font-family:'DM Mono',monospace;font-size:.6rem;color:var(--tx2);
  min-width:28px;text-align:center;line-height:26px;
  border-left:1px solid var(--bd);border-right:1px solid var(--bd);
}

#chlbl{
  font-family:'DM Mono',monospace;font-size:.6rem;
  color:var(--tx2);white-space:nowrap;min-width:58px;
  text-align:center;letter-spacing:.05em;
}

/* ═══════════════════════ PROGRESS ═══════════════════════ */
#prog{
  position:fixed;top:var(--bar);left:0;
  height:1.5px;width:0%;
  background:linear-gradient(90deg,var(--gd2),var(--gd3));
  z-index:299;transition:width .12s linear;
}

/* ═══════════════════════ OVERLAY + PANELS ═══════════════════════ */
#ovl{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.55);z-index:200;
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
}
#ovl.on{display:block}

.panel{
  position:fixed;top:var(--bar);right:0;bottom:0;
  width:290px;max-width:88vw;
  background:var(--s1);border-left:1px solid var(--bd);
  z-index:250;display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}
.panel.on{transform:translateX(0)}

.ph{
  padding:13px 14px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.ph h3{
  font-family:'DM Mono',monospace;font-size:.62rem;
  color:var(--gd);letter-spacing:.14em;text-transform:uppercase;
}
.pclose{
  background:none;border:none;color:var(--tx2);
  cursor:pointer;font-size:1rem;padding:2px 5px;
  border-radius:4px;line-height:1;transition:color .14s;
}
.pclose:hover{color:var(--tx)}
.pb{flex:1;overflow-y:auto;padding:6px}

/* toc items */
.ti{
  padding:8px 10px;border-radius:5px;cursor:pointer;
  font-size:.8rem;line-height:1.4;color:var(--tx2);
  transition:all .13s;border:1px solid transparent;margin-bottom:2px;
}
.ti:hover{background:var(--s2);color:var(--tx)}
.ti.cur{background:var(--s2);border-color:var(--gd2);color:var(--gd3)}
.ti .cn{
  font-family:'DM Mono',monospace;font-size:.56rem;
  color:var(--tx3);display:block;margin-bottom:2px;
}

/* library items */
.li{
  display:flex;gap:9px;padding:8px;border-radius:6px;cursor:pointer;
  border:1px solid transparent;margin-bottom:3px;
  align-items:flex-start;transition:all .13s;
}
.li:hover{background:var(--s2);border-color:var(--bd2)}
.lthumb{
  width:38px;height:54px;object-fit:cover;border-radius:3px;
  background:var(--s3);flex-shrink:0;border:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;font-size:1rem;
  overflow:hidden;
}
.lthumb img{width:100%;height:100%;object-fit:cover;display:block}
.linf{flex:1;min-width:0}
.lname{
  font-size:.78rem;font-weight:600;color:var(--tx);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;
}
.lmeta{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--tx2);line-height:1.6}
.lbar{height:2px;background:var(--bd);border-radius:1px;margin-top:4px;overflow:hidden}
.lbar-f{height:100%;background:var(--gd);border-radius:1px}

/* ═══════════════════════ HOME ═══════════════════════ */
#home{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;padding:70px 20px 50px;
  gap:26px;text-align:center;
}

.home-title{
  font-family:'Crimson Pro',serif;
  font-size:clamp(2rem,5.5vw,3.2rem);
  font-weight:300;color:var(--tx);
  letter-spacing:.06em;opacity:.65;line-height:1.15;
}
.home-sub{
  font-family:'DM Mono',monospace;
  font-size:.62rem;color:var(--gd);
  letter-spacing:.22em;text-transform:uppercase;
  margin-bottom:6px;
}

/* drop zone */
#dz{
  position:relative;
  border:1px dashed var(--bd2);border-radius:10px;
  padding:38px 48px;cursor:pointer;
  transition:all .22s;max-width:380px;width:100%;
}
#dz:hover,#dz.over{
  border-color:var(--gd2);background:rgba(196,162,74,.04);
}
#dz input{
  position:absolute;inset:0;opacity:0;
  cursor:pointer;width:100%;height:100%;
}
#dz .dzic{font-size:2rem;opacity:.2;margin-bottom:10px;line-height:1}
#dz p{
  font-family:'DM Mono',monospace;font-size:.65rem;
  color:var(--tx2);letter-spacing:.08em;text-transform:uppercase;
}
#dz small{display:block;margin-top:5px;opacity:.4;font-size:.58rem}

/* upload progress */
#upbar{display:none;flex-direction:column;gap:9px;width:100%;max-width:380px;align-items:center}
#upbar-t{width:100%;height:2px;background:var(--bd);border-radius:1px;overflow:hidden}
#upbar-f{height:100%;width:0%;background:var(--gd);border-radius:1px;transition:width .18s}
#upbar-l{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--tx2);letter-spacing:.08em}

#home-lib{width:100%;max-width:400px}
#home-lib h4{
  font-family:'DM Mono',monospace;font-size:.56rem;
  color:var(--tx3);letter-spacing:.14em;text-transform:uppercase;
  margin-bottom:7px;text-align:left;padding-left:2px;
}

/* ═══════════════════════ READER ═══════════════════════ */
#reader{
  display:none;
  padding-top:var(--bar);
  min-height:100vh;
}
#col{
  max-width:var(--maxw);
  margin:0 auto;
  padding:50px 22px 110px;
}

/* chapter heading */
.ch-title{
  font-family:'Crimson Pro',serif;
  font-size:clamp(1.25rem,3vw,1.72rem);
  font-weight:300;
  color:var(--gd3);
  text-align:center;
  margin-bottom:46px;
  padding-bottom:26px;
  border-bottom:1px solid var(--bd);
  letter-spacing:.04em;
  line-height:1.35;
  opacity:0;animation:fu .5s ease forwards;
}

/* text paragraph */
.para{
  margin-bottom:1.4em;
  color:var(--tx);
  opacity:0;animation:fu .38s ease forwards;
}

/* scene break */
.sbrk{
  text-align:center;color:var(--tx3);
  margin:2em 0;letter-spacing:.45em;font-size:.78rem;
}

/* image — NO filter, NO invert, original colors always */
.img-wrap{
  display:flex;justify-content:center;
  margin:2.6em 0;
  opacity:0;animation:fu .4s ease forwards;
}
.nov-img{
  max-width:100%;max-height:80vh;
  object-fit:contain;border-radius:3px;
  display:block;
  /* ✦ Critical: zero dark-mode override on images ✦ */
}

/* chapter navigation */
.nav-row{
  display:flex;align-items:center;justify-content:center;
  gap:10px;margin-top:60px;padding-top:30px;
  border-top:1px solid var(--bd);flex-wrap:wrap;
}
.nb{
  padding:9px 20px;border-radius:var(--r);
  border:1px solid var(--bd2);background:var(--s3);
  color:var(--tx2);
  font-family:'DM Mono',monospace;font-size:.65rem;
  cursor:pointer;transition:all .18s;letter-spacing:.05em;
}
.nb:hover:not(:disabled){border-color:var(--gd2);color:var(--gd3);background:var(--s2)}
.nb.nxt{
  background:var(--gd2);border-color:var(--gd);
  color:var(--gd3);font-size:.7rem;padding:10px 30px;
}
.nb.nxt:hover:not(:disabled){background:#907522}
.nb:disabled{opacity:.22;cursor:default;pointer-events:none}
.nav-inf{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--tx3)}

/* ═══════════════════════ LOADING ═══════════════════════ */
#lov{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.88);backdrop-filter:blur(8px);
  z-index:500;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
}
#lov.on{display:flex}
.spin{
  width:32px;height:32px;
  border:1.5px solid var(--bd2);
  border-top-color:var(--gd);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.lmsg{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--tx2);letter-spacing:.1em}
.lsub{font-family:'DM Mono',monospace;font-size:.56rem;color:var(--tx3);letter-spacing:.07em;margin-top:-8px}

/* ═══════════════════════ TOAST ═══════════════════════ */
#toast{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(14px);
  background:var(--s3);border:1px solid var(--bd2);
  color:var(--tx);
  font-family:'DM Mono',monospace;font-size:.65rem;
  padding:8px 18px;border-radius:18px;
  opacity:0;transition:all .26s;z-index:999;
  pointer-events:none;white-space:nowrap;letter-spacing:.06em;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:var(--gr);color:#5ab870}
#toast.er{border-color:var(--re);color:#d46060}

/* ═══════════════════════ INSTALL BANNER ═══════════════════════ */
#ibanner{
  display:none;
  position:fixed;bottom:14px;left:50%;
  transform:translateX(-50%);
  background:var(--s2);border:1px solid var(--gd2);
  border-radius:10px;padding:13px 18px;
  z-index:400;flex-direction:column;gap:10px;
  align-items:center;max-width:330px;width:90%;
  box-shadow:0 6px 36px rgba(0,0,0,.65);
}
#ibanner.on{display:flex}
#ibanner p{
  font-family:'DM Mono',monospace;font-size:.65rem;
  color:var(--tx2);letter-spacing:.05em;text-align:center;
}
.irow{display:flex;gap:8px}

/* ═══════════════════════ ARABIC MODE ═══════════════════════ */
body.ar #col{
  direction:rtl;
  font-family:'Noto Naskh Arabic','Crimson Pro',serif;
  font-size:calc(var(--fs) * 1.06);
}

/* ═══════════════════════ ANIMATIONS ═══════════════════════ */
@keyframes fu{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
.para:nth-child(1){animation-delay:.02s}
.para:nth-child(2){animation-delay:.05s}
.para:nth-child(3){animation-delay:.08s}
.para:nth-child(4){animation-delay:.11s}
.para:nth-child(5){animation-delay:.14s}
.para:nth-child(6){animation-delay:.17s}
.para:nth-child(n+7){animation-delay:.20s}

/* ═══════════════════════ RESPONSIVE ═══════════════════════ */
@media(max-width:560px){
  :root{--fs:17px}
  #col{padding:36px 16px 100px}
  .btn span{display:none}
  .logo{font-size:.62rem}
  #dz{padding:30px 22px}
}
</style>
</head>
<body>

<!-- ══ TOPBAR ══ -->
<div id="bar">
  <span class="logo">◈ Novel</span>

  <button class="btn" id="lib-btn" onclick="openPanel('lib-p')" title="Library">
    <svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
    <span>Library</span>
  </button>

  <button class="btn" id="toc-btn" onclick="openPanel('toc-p')" style="display:none" title="Chapters">
    <svg viewBox="0 0 24 24"><path d="M3 9h14V7H3v2zm0 4h14v-2H3v2zm0 4h14v-2H3v2zm16 0h2v-2h-2v2zm0-10v2h2V7h-2zm0 6h2v-2h-2v2z"/></svg>
    <span>Ch.</span>
  </button>

  <div class="gap"></div>
  <span id="chlbl" style="display:none"></span>

  <div class="fsw" id="fsw" style="display:none">
    <button onclick="chFs(-1)">−</button>
    <span id="fslbl">19</span>
    <button onclick="chFs(1)">+</button>
  </div>

  <button class="btn" id="trbtn" onclick="toggleTr()" style="display:none" title="Translate">
    <svg viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03A17.52 17.52 0 0014.07 6H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg>
    <span>Translate</span>
  </button>

  <label class="btn gold" style="cursor:pointer" title="Open PDF">
    <svg viewBox="0 0 24 24"><path d="M19.35 10.04A7.49 7.49 0 0012 4C9.11 4 6.6 5.64 5.35 8.04A5.994 5.994 0 000 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
    <span>Open</span>
    <input type="file" accept=".pdf" style="display:none" onchange="onFile(event)">
  </label>
</div>

<div id="prog"></div>
<div id="ovl" onclick="closePanels()"></div>

<!-- ══ LIBRARY PANEL ══ -->
<div class="panel" id="lib-p">
  <div class="ph">
    <h3>Library</h3>
    <button class="pclose" onclick="closePanels()">✕</button>
  </div>
  <div class="pb" id="lib-list">
    <p style="font-family:'DM Mono',monospace;font-size:.62rem;color:var(--tx3);padding:18px;text-align:center">
      No books yet.<br>Open a PDF to start.
    </p>
  </div>
</div>

<!-- ══ TOC PANEL ══ -->
<div class="panel" id="toc-p">
  <div class="ph">
    <h3>Chapters</h3>
    <button class="pclose" onclick="closePanels()">✕</button>
  </div>
  <div class="pb" id="toc-list"></div>
</div>

<!-- ══ HOME ══ -->
<div id="home">
  <div>
    <div class="home-sub">Personal Reading App</div>
    <div class="home-title">Novel Reader</div>
  </div>

  <div id="dz"
    ondragover="dzOver(event)" ondragleave="dzLeave()" ondrop="dzDrop(event)">
    <div class="dzic">📄</div>
    <p>Drop PDF here · or tap to browse
      <small>100% local · works offline after first load</small>
    </p>
    <input type="file" accept=".pdf" onchange="onFile(event)">
  </div>

  <div id="upbar">
    <div id="upbar-t"><div id="upbar-f"></div></div>
    <div id="upbar-l">Reading PDF…</div>
  </div>

  <div id="home-lib">
    <h4>Recent</h4>
    <div id="home-lib-list"></div>
  </div>
</div>

<!-- ══ READER ══ -->
<div id="reader">
  <div id="col"></div>
</div>

<!-- ══ LOADING OVERLAY ══ -->
<div id="lov">
  <div class="spin"></div>
  <div class="lmsg" id="lmsg">Loading…</div>
  <div class="lsub" id="lsub"></div>
</div>

<!-- ══ TOAST ══ -->
<div id="toast"></div>

<!-- ══ INSTALL BANNER ══ -->
<div id="ibanner">
  <p>Install Novel Reader as an app for offline reading</p>
  <div class="irow">
    <button class="btn" onclick="dismissInstall()">Not now</button>
    <button class="btn gold" onclick="doInstall()">Install</button>
  </div>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════
   PWA: MANIFEST (blob — no external file needed)
═══════════════════════════════════════════════ */
(function () {
  const m = {
    name: 'Novel Reader', short_name: 'Novels',
    description: 'Read web novels and light novels from PDF files',
    start_url: './', display: 'standalone',
    background_color: '#000000', theme_color: '#000000',
    icons: [
      { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='24' fill='%23000'/%3E%3Ctext x='96' y='138' font-size='112' text-anchor='middle'%3E📖%3C/text%3E%3C/svg%3E", sizes: '192x192', type: 'image/svg+xml' },
      { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='60' fill='%23000'/%3E%3Ctext x='256' y='370' font-size='300' text-anchor='middle'%3E📖%3C/text%3E%3C/svg%3E", sizes: '512x512', type: 'image/svg+xml' },
    ]
  };
  const blob = new Blob([JSON.stringify(m)], { type: 'application/manifest+json' });
  document.getElementById('pwa-manifest').href = URL.createObjectURL(blob);
})();

/* ═══════════════════════════════════════════════
   SERVICE WORKER (blob — no external file needed)
═══════════════════════════════════════════════ */
(function () {
  if (!('serviceWorker' in navigator)) return;
  const code = `
const V='nr-v2';
const PRE=[
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'
];
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(V).then(c=>c.addAll(PRE).catch(()=>{})).then(()=>self.skipWaiting()));
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==V).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));
});
self.addEventListener('fetch',e=>{
  if(e.request.method!=='GET')return;
  const u=new URL(e.request.url);
  if(u.origin===location.origin){
    e.respondWith(fetch(e.request).then(r=>{caches.open(V).then(c=>c.put(e.request,r.clone()));return r;}).catch(()=>caches.match(e.request)));
  } else {
    e.respondWith(caches.match(e.request).then(c=>c||fetch(e.request).then(r=>{caches.open(V).then(ch=>ch.put(e.request,r.clone()));return r;})));
  }
});`;
  const blob = new Blob([code], { type: 'text/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob), { scope: './' }).catch(() => {});

/* ═══════════════════════════════════════════════
   IndexedDB  (bookmarks + library)
═══════════════════════════════════════════════ */
let _idb = null;
function openIDB() {
  if (_idb) return Promise.resolve(_idb);
  return new Promise((ok, fail) => {
    const req = indexedDB.open('NovelReader', 2);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      ['bookmarks', 'library'].forEach(s => {
        if (!db.objectStoreNames.contains(s))
          db.createObjectStore(s, { keyPath: 'bookId' });
      });
    };
    req.onsuccess = e => { _idb = e.target.result; ok(_idb); };
    req.onerror = () => fail(req.error);
  });
}
async function idbGet(store, key) {
  const db = await openIDB();
  return new Promise((ok, fail) => {
    const r = db.transaction(store).objectStore(store).get(key);
    r.onsuccess = () => ok(r.result);
    r.onerror = () => fail(r.error);
  });
}
async function idbPut(store, val) {
  const db = await openIDB();
  return new Promise((ok, fail) => {
    const r = db.transaction(store, 'readwrite').objectStore(store).put(val);
    r.onsuccess = () => ok();
    r.onerror = () => fail(r.error);
  });
}
async function idbAll(store) {
  const db = await openIDB();
  return new Promise((ok, fail) => {
    const r = db.transaction(store).objectStore(store).getAll();
    r.onsuccess = () => ok(r.result);
    r.onerror = () => fail(r.error);
  });
}

/* ═══════════════════════════════════════════════
   CHAPTER DETECTION
═══════════════════════════════════════════════ */
const CH_RE = [
  /^\s*(chapter|ch\.?)\s*[\d\u0660-\u0669]+/i,
  /^\s*(prologue|epilogue|interlude|afterword|side\s*story)/i,
  /^\s*فصل\s*[\d\u0660-\u0669]+/u,
  /^\s*(مقدمة|خاتمة|تمهيد|ملحق|تمهيد)/u,
  /^\s*\d+\s*[-–—]\s*\S+/,
];
function isHead(t) {
  t = t.trim();
  return t.length > 0 && t.length <= 120 && CH_RE.some(r => r.test(t));
}

/* ═══════════════════════════════════════════════
   PDF PROCESSING  —  pure PDF.js in browser
═══════════════════════════════════════════════ */

/**
 * Render one page to a canvas and return an ImageBitmap
 * at 2× scale — full original colors, no filter.
 */
async function pageToImageBitmap(page) {
  const scale = 2.0;
  const vp = page.getViewport({ scale });
  const canvas = document.createElement('canvas');
  canvas.width  = vp.width;
  canvas.height = vp.height;
  const ctx = canvas.getContext('2d');
  await page.render({ canvasContext: ctx, viewport: vp }).promise;
  return await createImageBitmap(canvas);
}

/**
 * Detect whether a page is image-heavy (illustration page).
 * Heuristic: fewer than 40 text chars AND at least one image operator.
 */
async function isImagePage(page) {
  const tc = await page.getTextContent();
  const chars = tc.items.reduce((s, i) => s + (i.str || '').trim().length, 0);
  if (chars > 80) return false; // mostly text
  const ops = await page.getOperatorList();
  // OPS 82 = paintImageXObject, 83 = paintInlineImageXObject
  return ops.fnArray.some(fn => fn === 82 || fn === 83);
}

/**
 * Extract page into an array of elements:
 *   {type:'text', content:str, isHead:bool}
 *   {type:'image', bitmap:ImageBitmap}
 *
 * Strategy:
 *  - If page is image-heavy → emit one image element for the whole page
 *  - Otherwise extract text lines grouped by Y, interleave with any
 *    detected sub-images (heuristic: contiguous non-text region in operator list)
 */
async function extractPage(page) {
  const elems = [];

  // ── image page? ──
  if (await isImagePage(page)) {
    const bmp = await pageToImageBitmap(page);
    elems.push({ type: 'image', bitmap: bmp });
    return elems;
  }

  // ── text extraction ──
  const tc = await page.getTextContent({ normalizeWhitespace: true });

  // Group items into lines by rounded Y (PDF Y is bottom-up)
  const lineMap = new Map();
  for (const item of tc.items) {
    const s = item.str;
    if (!s || !s.trim()) continue;
    // Use negative Y so sorting = top-to-bottom
    const y = -Math.round(item.transform[5]);
    if (!lineMap.has(y)) lineMap.set(y, []);
    lineMap.get(y).push(s);
  }

  const lines = [...lineMap.entries()]
    .sort((a, b) => a[0] - b[0])
    .map(([, strs]) => strs.join(' ').trim())
    .filter(Boolean);

  for (const line of lines) {
    elems.push({ type: 'text', content: line, isHead: isHead(line) });
  }

  // ── look for inline images within a text-heavy page ──
  // We inspect operator list for paintImage ops and render that region
  const ops = await page.getOperatorList();
  const hasInlineImg = ops.fnArray.some(fn => fn === 82 || fn === 83);
  if (hasInlineImg && elems.length > 0) {
    // Render full page and inject as image between text
    // (we insert it at the end of text; most LN illustrations appear after chapter text)
    const bmp = await pageToImageBitmap(page);
    elems.push({ type: 'image', bitmap: bmp });
  }

  return elems;
}

/**
 * Build chapters array from all pages.
 * Returns [{title, elems:[...]}]
 */
async function buildChapters(pdfDoc, onProgress) {
  const total = pdfDoc.numPages;
  let chapters = [];
  let cur = { title: 'Start', elems: [] };

  for (let pn = 1; pn <= total; pn++) {
    onProgress(pn, total);
    const page = await pdfDoc.getPage(pn);
    const elems = await extractPage(page);

    for (const el of elems) {
      if (el.type === 'text' && el.isHead) {
        if (cur.elems.length) chapters.push(cur);
        cur = { title: el.content.trim(), elems: [el] };
      } else {
        cur.elems.push(el);
      }
    }
  }

  if (cur.elems.length) chapters.push(cur);
  if (!chapters.length) chapters = [{ title: 'Content', elems: [] }];
  return chapters;
}

/**
 * Render first page as a data-URL thumbnail for the library cover.
 */
async function makeCover(pdfDoc) {
  try {
    const page = await pdfDoc.getPage(1);
    const vp = page.getViewport({ scale: 0.3 });
    const canvas = document.createElement('canvas');
    canvas.width  = vp.width;
    canvas.height = vp.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
    return canvas.toDataURL('image/jpeg', 0.7);
  } catch { return ''; }
}

/* ═══════════════════════════════════════════════
   FILE OPEN
═══════════════════════════════════════════════ */
function onFile(e) {
  const file = e.target.files[0];
  if (file) processFile(file);
  e.target.value = '';
}
function dzOver(e) { e.preventDefault(); document.getElementById('dz').classList.add('over'); }
function dzLeave()  { document.getElementById('dz').classList.remove('over'); }
function dzDrop(e)  {
  e.preventDefault(); dzLeave();
  const file = e.dataTransfer.files[0];
  if (file && file.name.toLowerCase().endsWith('.pdf')) processFile(file);
  else toast('Only PDF files accepted', 'er');
}

async function processFile(file) {
  if (!file.name.toLowerCase().endsWith('.pdf')) {
    toast('Only PDF files accepted', 'er'); return;
  }

  const bookId   = file.name.replace(/[^a-zA-Z0-9_.\u0600-\u06FF]/g, '_').slice(0, 80);
  const bookName = file.name;

  // Show upload progress bar
  setUpbar(true, 'Reading PDF…', 0);

  try {
    const arrayBuf = await file.arrayBuffer();
    setUpbar(true, 'Parsing…', 20);

    const pdfDoc = await pdfjsLib.getDocument({ data: arrayBuf }).promise;
    S.pdfDoc = pdfDoc;

    setUpbar(true, `Processing ${pdfDoc.numPages} pages…`, 30);

    const chapters = await buildChapters(pdfDoc, (cur, tot) => {
      const pct = 30 + Math.round((cur / tot) * 55);
      setUpbar(true, `Page ${cur} / ${tot}`, pct);
    });

    setUpbar(true, 'Generating cover…', 88);
    const cover = await makeCover(pdfDoc);
    setUpbar(true, 'Done!', 100);
    setTimeout(() => setUpbar(false), 600);

    // ── state ──
    S.bookId    = bookId;
    S.bookName  = bookName;
    S.chapters  = chapters;
    S.curCh     = 0;
    S.translated = false;
    S.trCache   = null;

    // ── save to library ──
    await idbPut('library', {
      bookId, bookName,
      totalChapters: chapters.length,
      cover,
      addedAt: new Date().toISOString(),
    });

    // ── check bookmark ──
    const bm = await idbGet('bookmarks', bookId);
    const startCh  = bm ? bm.chIdx  : 0;
    const startScr = bm ? bm.scroll : 0;

    buildTOC();
    showReader();
    await renderChapter(startCh, startScr);
    refreshLibPanel();
    refreshHomeLib();
    toast(`Opened: ${bookName}`, 'ok');

  } catch (err) {
    setUpbar(false);
    toast('Error: ' + err.message, 'er');
    console.error(err);
  }
}

/* ═══════════════════════════════════════════════
   RENDER CHAPTER
═══════════════════════════════════════════════ */
async function renderChapter(idx, scrollTo = 0) {
  if (idx < 0 || idx >= S.chapters.length) return;
  showLoad('Loading chapter…');

  S.curCh    = idx;
  S.rawElems = S.chapters[idx].elems;
  S.translated = false;
  S.trCache  = null;
  document.body.classList.remove('ar');
  document.getElementById('trbtn').classList.remove('on');

  buildContent(document.getElementById('col'), S.chapters[idx].title, S.rawElems, null);
  updateChLabel();
  updateTOCActive();

  hideLoad();

  if (scrollTo > 0) {
    requestAnimationFrame(() => requestAnimationFrame(() => window.scrollTo(0, scrollTo)));
  } else {
    window.scrollTo(0, 0);
  }
}

/**
 * Build DOM content for a chapter.
 * translations = array of strings (parallel to text lines) or null.
 */
function buildContent(col, title, elems, translations) {
  col.innerHTML = '';

  const hEl = document.createElement('div');
  hEl.className = 'ch-title';
  hEl.textContent = title;
  col.appendChild(hEl);

  let tIdx = 0;

  for (const el of elems) {
    if (el.type === 'text') {
      const lines = el.content.split('\n');
      for (const line of lines) {
        const isSbrk = /^\s*[*\-~—]{3,}\s*$/.test(line);
        const p = document.createElement('p');
        if (isSbrk) {
          p.className = 'sbrk';
          p.textContent = '· · ·';
        } else {
          p.className = 'para';
          if (translations) {
            p.textContent = translations[tIdx] || line || '\u00A0';
            tIdx++;
          } else {
            p.textContent = line || '\u00A0';
          }
        }
        col.appendChild(p);
      }
    } else if (el.type === 'image') {
      const wrap = document.createElement('div');
      wrap.className = 'img-wrap';

      const img = document.createElement('img');
      img.className = 'nov-img';
      img.alt = 'Illustration';
      img.loading = 'lazy';

      // Convert ImageBitmap → canvas → data URL  (original colors, no filter)
      const canvas = document.createElement('canvas');
      canvas.width  = el.bitmap.width;
      canvas.height = el.bitmap.height;
      canvas.getContext('2d').drawImage(el.bitmap, 0, 0);
      img.src = canvas.toDataURL('image/png');

      wrap.appendChild(img);
      col.appendChild(wrap);
    }
  }

  // ── navigation ──
  const nav = document.createElement('div');
  nav.className = 'nav-row';

  const prev = document.createElement('button');
  prev.className = 'nb';
  prev.textContent = translations ? '← السابق' : '← Prev';
  prev.disabled = S.curCh <= 0;
  prev.onclick = () => renderChapter(S.curCh - 1);

  const inf = document.createElement('span');
  inf.className = 'nav-inf';
  inf.textContent = `${S.curCh + 1} / ${S.chapters.length}`;

  const next = document.createElement('button');
  next.className = 'nb nxt';
  next.textContent = translations ? 'التالي →' : 'Next →';
  next.disabled = S.curCh >= S.chapters.length - 1;
  next.onclick = () => renderChapter(S.curCh + 1);

  nav.append(prev, inf, next);
  col.appendChild(nav);
}

/* ═══════════════════════════════════════════════
   TRANSLATION  (MyMemory free API — no key needed)
   Falls back to a second free endpoint.
═══════════════════════════════════════════════ */
async function translateTexts(texts) {
  // MyMemory: up to 500 chars per call, free, no key
  const results = [];
  // Batch texts into ≤ 400-char chunks
  const chunks = [];
  let cur = [];
  let curLen = 0;
  for (const t of texts) {
    if (curLen + t.length > 400 && cur.length) {
      chunks.push([...cur]);
      cur = []; curLen = 0;
    }
    cur.push(t);
    curLen += t.length + 1;
  }
  if (cur.length) chunks.push(cur);

  for (const chunk of chunks) {
    const joined = chunk.join('\n');
    try {
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(joined)}&langpair=en|ar`;
      const r = await fetch(url);
      const d = await r.json();
      if (d.responseStatus === 200) {
        const translated = d.responseData.translatedText;
        const lines = translated.split('\n');
        // Align — if mismatch, pad or trim
        for (let i = 0; i < chunk.length; i++) {
          results.push(lines[i] || chunk[i]);
        }
      } else {
        chunk.forEach(t => results.push(t));
      }
    } catch {
      chunk.forEach(t => results.push(t));
    }
  }
  return results;
}

async function toggleTr() {
  if (!S.bookId) return;

  if (S.translated) {
    // Revert
    S.translated = false;
    document.body.classList.remove('ar');
    document.getElementById('trbtn').classList.remove('on');
    buildContent(document.getElementById('col'), S.chapters[S.curCh].title, S.rawElems, null);
    return;
  }

  if (S.trCache) { applyTr(); return; }

  showLoad('Translating…', 'Using MyMemory free API…');

  try {
    // Collect all non-sbrk text lines
    const texts = [];
    for (const el of S.rawElems) {
      if (el.type === 'text') {
        for (const line of el.content.split('\n')) {
          if (!/^\s*[*\-~—]{3,}\s*$/.test(line)) {
            texts.push(line.trim() || ' ');
          }
        }
      }
    }
    S.trCache = await translateTexts(texts);
    applyTr();
  } catch (err) {
    toast('Translation error: ' + err.message, 'er');
  } finally {
    hideLoad();
  }
}

function applyTr() {
  S.translated = true;
  document.body.classList.add('ar');
  document.getElementById('trbtn').classList.add('on');
  buildContent(document.getElementById('col'), S.chapters[S.curCh].title, S.rawElems, S.trCache);
  toast('Translated to Arabic ✓', 'ok');
}

/* ═══════════════════════════════════════════════
   BOOKMARKS  (auto-save every 2s after scroll stops)
═══════════════════════════════════════════════ */
async function saveBookmark() {
  if (!S.bookId) return;
  try {
    await idbPut('bookmarks', {
      bookId:  S.bookId,
      chIdx:   S.curCh,
      scroll:  window.scrollY,
      savedAt: new Date().toISOString(),
    });
  } catch {}
}

/* ═══════════════════════════════════════════════
   SCROLL HANDLER
═══════════════════════════════════════════════ */
window.addEventListener('scroll', () => {
  const sy = window.scrollY;
  const dh = document.documentElement.scrollHeight - window.innerHeight;
  document.getElementById('prog').style.width = (dh > 0 ? (sy / dh) * 100 : 0) + '%';

  // Auto-save bookmark 2s after scroll stops
  clearTimeout(S.scrollTimer);
  S.scrollTimer = setTimeout(saveBookmark, 2000);

  // Hide / show topbar
  const d = sy - S.lastSY;
  if (sy > 90) {
    if (d > 10 && S.topbarVis) {
      document.getElementById('bar').classList.add('hide');
      S.topbarVis = false;
    } else if (d < -10 && !S.topbarVis) {
      document.getElementById('bar').classList.remove('hide');
      S.topbarVis = true;
    }
  } else if (!S.topbarVis) {
    document.getElementById('bar').classList.remove('hide');
    S.topbarVis = true;
  }
  S.lastSY = sy;
}, { passive: true });

window.addEventListener('beforeunload', saveBookmark);
window.addEventListener('pagehide',     saveBookmark);

   TOC
═══════════════════════════════════════════════ */
function buildTOC() {
  const list = document.getElementById('toc-list');
  list.innerHTML = '';
  S.chapters.forEach((ch, i) => {
    const el = document.createElement('div');
    el.className = 'ti';
    el.id = `ti${i}`;
    el.innerHTML = `<span class="cn">CH ${String(i + 1).padStart(2, '0')}</span>${ch.title}`;
    el.onclick = () => { renderChapter(i); closePanels(); };
    list.appendChild(el);
  });
}
function updateTOCActive() {
  document.querySelectorAll('.ti').forEach((el, i) => el.classList.toggle('cur', i === S.curCh));
  document.getElementById(`ti${S.curCh}`)?.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}
function updateChLabel() {
  document.getElementById('chlbl').textContent = `${S.curCh + 1}/${S.chapters.length}`;
}

/* ═══════════════════════════════════════════════
   LIBRARY
═══════════════════════════════════════════════ */
async function refreshLibPanel() {
  const list = document.getElementById('lib-list');
  try {
    const books = await idbAll('library');
    const bms   = await idbAll('bookmarks');
    const bmMap = Object.fromEntries(bms.map(b => [b.bookId, b]));

    list.innerHTML = '';
    if (!books.length) {
      list.innerHTML = '<p style="font-family:\'DM Mono\',monospace;font-size:.62rem;color:var(--tx3);padding:18px;text-align:center">No books yet.</p>';
      return;
    }

    books.sort((a, b) => {
      const ba = bmMap[a.bookId], bb = bmMap[b.bookId];
      const ta = ba?.savedAt || a.addedAt, tb = bb?.savedAt || b.addedAt;
      return tb.localeCompare(ta);
    });

    for (const book of books) {
      const bm  = bmMap[book.bookId];
      const pct = book.totalChapters > 0
        ? Math.round(((bm?.chIdx || 0) / book.totalChapters) * 100) : 0;
      const item = document.createElement('div');
      item.className = 'li';

      const thumb = document.createElement('div');
      thumb.className = 'lthumb';
      if (book.cover) {
        const img = document.createElement('img');
        img.src = book.cover; img.alt = '';
        thumb.appendChild(img);
      } else {
        thumb.textContent = '📖';
      }

      item.innerHTML += '';
      item.appendChild(thumb);

      const inf = document.createElement('div');
      inf.className = 'linf';
      inf.innerHTML = `
        <div class="lname" title="${book.bookName}">${book.bookName}</div>
        <div class="lmeta">Ch ${(bm?.chIdx || 0) + 1}/${book.totalChapters}${bm?.savedAt ? ' · ' + new Date(bm.savedAt).toLocaleDateString() : ''}</div>
        <div class="lbar"><div class="lbar-f" style="width:${pct}%"></div></div>`;
      item.appendChild(inf);

      item.onclick = () => {
        closePanels();
        toast('Re-open the PDF file to continue reading', '', 3500);
      };
      list.appendChild(item);
    }
  } catch {
    list.innerHTML = '<p style="padding:12px;font-size:.65rem;color:var(--tx3)">Could not load library.</p>';
  }
}

async function refreshHomeLib() {
  const cont = document.getElementById('home-lib-list');
  cont.innerHTML = '';
  try {
    const books = await idbAll('library');
    const bms   = await idbAll('bookmarks');
    const bmMap = Object.fromEntries(bms.map(b => [b.bookId, b]));
    if (!books.length) { document.getElementById('home-lib').style.display = 'none'; return; }
    document.getElementById('home-lib').style.display = '';

    books.sort((a, b) => {
      const ta = bmMap[a.bookId]?.savedAt || a.addedAt;
      const tb = bmMap[b.bookId]?.savedAt || b.addedAt;
      return tb.localeCompare(ta);
    });

    for (const book of books.slice(0, 4)) {
      const bm  = bmMap[book.bookId];
      const pct = book.totalChapters > 0
        ? Math.round(((bm?.chIdx || 0) / book.totalChapters) * 100) : 0;
      const item = document.createElement('div');
      item.className = 'li';
      item.style.cssText = 'border:1px solid var(--bd);border-radius:8px;background:var(--s3)';

      const thumb = document.createElement('div');
      thumb.className = 'lthumb';
      if (book.cover) {
        const img = document.createElement('img'); img.src = book.cover; img.alt = '';
        thumb.appendChild(img);
      } else { thumb.textContent = '📖'; }

      const inf = document.createElement('div');
      inf.className = 'linf';
      inf.innerHTML = `
        <div class="lname">${book.bookName}</div>
        <div class="lmeta">Ch ${(bm?.chIdx || 0) + 1} · ${pct}% read</div>
        <div class="lbar"><div class="lbar-f" style="width:${pct}%"></div></div>`;

      item.appendChild(thumb);
      item.appendChild(inf);
      cont.appendChild(item);
    }
  } catch {}
}

function showReader() {
  document.getElementById('home').style.display   = 'none';
  document.getElementById('reader').style.display = 'block';

}
function closePanels() {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  document.getElementById('ovl').classList.remove('on');
}

function setUpbar(show, label = '', pct = 0) {
  const wrap = document.getElementById('upbar');
  wrap.style.display = show ? 'flex' : 'none';
  document.getElementById('upbar-f').style.width = pct + '%';
  document.getElementById('upbar-l').textContent = label;
}

function showLoad(msg = 'Loading…', sub = '') {
  document.getElementById('lmsg').textContent = msg;
  document.getElementById('lsub').textContent = sub;
  document.getElementById('lov').classList.add('on');
}
function hideLoad() { document.getElementById('lov').classList.remove('on'); }

let _tt;
function toast(msg, type = '', dur = 2800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'on' + (type ? ' ' + type : '');
  clearTimeout(_tt);
  _tt = setTimeout(() => { t.className = ''; }, dur);
}

/* Font size */
function chFs(d) {
  S.fontSize = Math.max(13, Math.min(28, S.fontSize + d));
  document.documentElement.style.setProperty('--fs', S.fontSize + 'px');
  document.getElementById('fslbl').textContent = S.fontSize;
  try { localStorage.setItem('nr_fs', S.fontSize); } catch {}
}
(function loadFs() {
  const v = parseInt(localStorage.getItem('nr_fs'));
  if (v >= 13 && v <= 28) {
    S.fontSize = v;
    document.documentElement.style.setProperty('--fs', v + 'px');
    document.getElementById('fslbl').textContent = v;
  }
})();

/* ═══════════════════════════════════════════════
   PWA INSTALL
═══════════════════════════════════════════════ */
let _deferredInstall = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredInstall = e;
  // Show banner after 3s if not already installed
  setTimeout(() => {
    if (_deferredInstall) document.getElementById('ibanner').classList.add('on');
  }, 3000);
});
window.addEventListener('appinstalled', () => {
  _deferredInstall = null;
  document.getElementById('ibanner').classList.remove('on');
});
function doInstall() {
  document.getElementById('ibanner').classList.remove('on');
  if (_deferredInstall) { _deferredInstall.prompt(); _deferredInstall = null; }
}
function dismissInstall() {
  document.getElementById('ibanner').classList.remove('on');
  _deferredInstall = null;
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
(async function init() {
  await openIDB();
  await refreshHomeLib();
})();
</script>
